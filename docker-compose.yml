version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: platform-postgres
    environment:
      POSTGRES_DB: platform_db
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: platform123
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_user -d platform_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:8.0
    container_name: platform-mongodb
    environment:
      MONGO_INITDB_DATABASE: platform_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platform-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: platform_db
      DB_USERNAME: platform_user
      DB_PASSWORD: platform123

      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB: platform_mongo

      REDIS_HOST: redis
      REDIS_PORT: 6379

      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: platform-ocr-service
    ports:
      - "8090:8090"
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB: platform_mongo

      OCR_SERVICE_PORT: 8090
      OCR_TESSDATA_PATH: /usr/share/tesseract-ocr/5/tessdata
      OCR_LANGUAGE: fas+eng
      OCR_PDF_DPI: 250
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:
