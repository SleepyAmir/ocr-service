spring:
  application:
    name: ocr-service

  data:
    mongodb:
      host: ${MONGO_HOST:localhost}
      port: ${MONGO_PORT:27017}
      database: ${MONGO_DB:platform_mongo}
      auto-index-creation: true

  servlet:
    multipart:
      enabled: true
      # We store the uploaded file bytes in MongoDB like the professor's sample.
      # Keep this safely below MongoDB's 16MB document limit.
      max-file-size: ${OCR_MAX_FILE_SIZE:10MB}
      max-request-size: ${OCR_MAX_REQUEST_SIZE:12MB}

server:
  port: ${OCR_SERVICE_PORT:8090}

ocr:
  # Local dev default: a path RELATIVE to the working directory (same trick
  # that worked in the main platform project) instead of relying on
  # classloader.getResource("tessdata").getPath(), which returns a
  # URL-style path (leading "/C:/...") that Tesseract's native library
  # does not reliably parse on Windows — that mismatch is what caused
  # "Error opening data file" / "Invalid memory access" here.
  # In Docker, OCR_TESSDATA_PATH overrides this with the real install path.
  tessdata-path: ${OCR_TESSDATA_PATH:src/main/resources/tessdata}
  language: ${OCR_LANGUAGE:fas}
  pdf-dpi: ${OCR_PDF_DPI:250}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.example.ocrservice: DEBUG